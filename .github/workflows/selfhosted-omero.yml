name: OMERO test-infra + Ontop + pytest

on:
  push:
  pull_request:

jobs:
  omero_ontop_pytest:
    runs-on: [self-hosted, Linux, X64, omero]

    env:
      OMERO_HOST: 127.0.0.1
      OMERO_PORT: "14064"
      OMERO_USER: root
      OMERO_PASS: omero

      # Postgres service exposed by docker-compose.override.yml
      PGHOST: db
      PGPORT: "5432"

      OMERO_DB: postgres
      
      PGDATABASE: postgres
      PGUSER: ontop
      PGPASSWORD: "!ontop$"

      # Default: keep CI fast; HCS tests are skipped by pytest.
      # Set to "1" if you want HSC test.
      RUN_HCS_IN_CI: "0"

      # Path to the generated Ontop properties file
      ONTOP_PROPERTIES_FILE: omero-test-infra.ci.properties

      # Fixed compose project name to ensure access test-infra network
      COMPOSE_PROJECT_NAME: ci-omero

    steps:
      - uses: actions/checkout@v4

      - name: Build CI container
        run: |
          set -euo pipefail
          docker build --pull -f Dockerfile.ci -t omero-ci-test .

      - name: Show runner info
        run: |
          set -euo pipefail
          whoami
          pwd
          uname -a
          docker --version
          docker compose version || true

      # ---------------------------------------------------------------------
      # Generate Ontop properties for CI (with envsubst)
      # ---------------------------------------------------------------------
      - name: Generate Ontop properties for CI
        run: |
          set -euo pipefail

          envsubst < omero-ontop-mappings/omero-test-infra.properties.template \
            > "omero-ontop-mappings/${ONTOP_PROPERTIES_FILE}"
          
          echo "Generated CI Ontop properties:"
          sed \
            -e 's/^jdbc.password=.*/jdbc.password=***hidden***/' \
            "omero-ontop-mappings/${ONTOP_PROPERTIES_FILE}"

      # ---------------------------------------------------------------------
      # omero-test-infra + port override 
      # ---------------------------------------------------------------------
      - name: Checkout omero-test-infra + add port override + mount repo
        run: |
          set -euo pipefail
          rm -rf .omero
          git clone --depth 1 https://github.com/ome/omero-test-infra .omero

          cat > .omero/docker-compose.override.yml <<'YAML'
          services:
            db:
              ports:
                - "15432:5432"
            omero:
              ports:
                - "14063:4063"
                - "14064:4064"
              volumes:
                - ..:/repo:ro
            web:
              ports:
                - "14080:4080"
          YAML

          echo "=== override ==="
          cat .omero/docker-compose.override.yml

      - name: Start OMERO test-infra stack
        run: |
          set -euo pipefail
          cd .omero
          docker compose -p "${COMPOSE_PROJECT_NAME}" up -d

      - name: Compose ps + logs for debugging
        run: |
          set -euo pipefail
          cd .omero
          docker compose -p "${COMPOSE_PROJECT_NAME}" ps
          docker compose -p "${COMPOSE_PROJECT_NAME}" logs --no-color --tail=120 db || true
          docker compose -p "${COMPOSE_PROJECT_NAME}" logs --no-color --tail=200 omero || true

      # ---------------------------------------------------------------------
      # Wait for Postgres 
      # ---------------------------------------------------------------------
      - name: Wait for Postgres to be ready
        run: |
          set -euo pipefail
          cd .omero
          for i in $(seq 1 120); do
            if docker compose -p "${COMPOSE_PROJECT_NAME}" exec -T db pg_isready -U postgres -d postgres >/dev/null 2>&1; then
              echo "Postgres is ready."
              exit 0
            fi
            echo "Postgres not ready ($i/120) ..."
            sleep 2
          done
          echo "Postgres never became ready."
          docker compose -p "${COMPOSE_PROJECT_NAME}" ps
          docker compose -p "${COMPOSE_PROJECT_NAME}" logs --no-color --tail=400 db || true
          exit 1

      # ---------------------------------------------------------------------
      # Create role ontop 
      # ---------------------------------------------------------------------
      - name: Create role ontop (no separate OMERO DB assumed)
        run: |
          set -euo pipefail
          cd .omero

          echo "Databases right now:"
          docker compose -p "${COMPOSE_PROJECT_NAME}" exec -T db psql -U postgres -d postgres -c "\l"

          docker compose -p "${COMPOSE_PROJECT_NAME}" exec -T db psql -U postgres -d postgres -c \
            "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'ontop') THEN CREATE ROLE ontop LOGIN PASSWORD '!ontop$'; END IF; END \$\$;"

          docker compose -p "${COMPOSE_PROJECT_NAME}" exec -T db psql -U postgres -d postgres -c "\du ontop" || true

      # ---------------------------------------------------------------------
      # Wait for OMERO 
      # ---------------------------------------------------------------------
      - name: Wait for OMERO schema marker public.dbpatch in DB 'postgres'
        run: |
          set -euo pipefail
          cd .omero
          echo "Waiting for OMERO schema in DB '${OMERO_DB}'..."

          for i in $(seq 1 300); do
            if docker compose -p "${COMPOSE_PROJECT_NAME}" exec -T db \
              psql -U postgres -d "${OMERO_DB}" -tAc "SELECT to_regclass('public.dbpatch');" \
              | grep -q "dbpatch"; then
              echo "OK: public.dbpatch exists (OMERO schema is ready)."
              exit 0
            fi

            echo "OMERO schema not ready yet ($i/300). Tail OMERO logs:"
            docker compose -p "${COMPOSE_PROJECT_NAME}" logs --no-color --tail=60 omero || true
            sleep 5
          done

          echo "ERROR: OMERO schema marker never appeared."
          docker compose -p "${COMPOSE_PROJECT_NAME}" logs --no-color --tail=400 omero || true
          docker compose -p "${COMPOSE_PROJECT_NAME}" logs --no-color --tail=250 db || true
          exit 1

      # ---------------------------------------------------------------------
      # Apply DB grants on the DB that actually contains OMERO tables
      # ---------------------------------------------------------------------
      - name: Grant ontop read access on OMERO DB (postgres)
        run: |
          set -euo pipefail
          cd .omero

          echo "Granting privileges for ontop on DB=${OMERO_DB} ..."

          docker compose -p "${COMPOSE_PROJECT_NAME}" exec -T db psql -U postgres -d postgres -c \
            "GRANT CONNECT ON DATABASE ${OMERO_DB} TO ontop;"

          docker compose -p "${COMPOSE_PROJECT_NAME}" exec -T db psql -U postgres -d "${OMERO_DB}" -c \
            "GRANT USAGE ON SCHEMA public TO ontop;"

          docker compose -p "${COMPOSE_PROJECT_NAME}" exec -T db psql -U postgres -d "${OMERO_DB}" -c \
            "GRANT SELECT ON ALL TABLES IN SCHEMA public TO ontop;"

          docker compose -p "${COMPOSE_PROJECT_NAME}" exec -T db psql -U postgres -d "${OMERO_DB}" -c \
            "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO ontop;"

          echo "Sanity check: ontop can read dbpatch:"
          docker compose -p "${COMPOSE_PROJECT_NAME}" exec -T db psql -U ontop -d "${OMERO_DB}" -tAc \
            "SELECT COUNT(*) FROM public.dbpatch;" || true

      # ---------------------------------------------------------------------
      # Verify repo mount inside OMERO container
      # ---------------------------------------------------------------------
      - name: Verify repo mount inside OMERO container
        run: |
          set -euo pipefail
          cd .omero
          docker compose -p "${COMPOSE_PROJECT_NAME}" exec -T omero sh -lc "ls -la /repo && ls -la /repo/img | head -n 30"

      # ---------------------------------------------------------------------
      # Populate OMERO INSIDE the container 
      # ---------------------------------------------------------------------
      - name: Populate OMERO (CI script)
        run: |
          set -euo pipefail
          chmod +x utils/insert_data_unified.sh
          MODE=container ./utils/insert_data_unified.sh

      # ---------------------------------------------------------------------
      # Populate HCS  INSIDE the OMERO container
      # ---------------------------------------------------------------------
      - name: Populate OMERO HCS dataset (inside container)
        if: env.RUN_HCS_IN_CI == '1'
        run: |
          set -euo pipefail

          docker compose -p "${COMPOSE_PROJECT_NAME}" -f .omero/docker-compose.yml exec -T omero bash -lc '
            set -euo pipefail
            OMERO=/opt/omero/server/OMERO.server/bin/omero
            
            # login (inside container uses internal port)
            "$OMERO" login -C -u root -w omero -s localhost:4064

            Screen=$("$OMERO" obj new Screen name="IDR0017-Screen")
            echo "Created Screen: $Screen"

            "$OMERO" import /repo/img/idr0017/idr0017.xdce -T "$Screen"
          '

      # ---------------------------------------------------------------------
      # Add Well:205 MapAnnotation needed by pytest 
      # ---------------------------------------------------------------------
      - name: Add Well:205 key-value annotation expected by pytest
        if: env.RUN_HCS_IN_CI == '1'
        run: |
          set -euo pipefail

          docker compose -p "${COMPOSE_PROJECT_NAME}" -f .omero/docker-compose.yml exec -T omero bash -lc '
            set -euo pipefail
            OMERO=/opt/omero/server/OMERO.server/bin/omero

            # Login (inside container uses internal SSL port)
            "$OMERO" login -C -u root -w omero -s localhost:4064

            # Create MapAnnotation and capture numeric ID
            ANN_ID=$("$OMERO" obj new MapAnnotation ns="http://www.openmicroscopy.org/ns/default/" | cut -d: -f2)
            echo "Created MapAnnotation:${ANN_ID}"

            # Set key/value pairs (keys must match what mappings expect)
            "$OMERO" obj map-set "MapAnnotation:${ANN_ID}" mapValue "Term/Source/1/Accession" "NCBITaxon_9606"
            "$OMERO" obj map-set "MapAnnotation:${ANN_ID}" mapValue "nseg.0.m.eccentricity.mean" "0.610481812"

            # Link to the well (Well:205 from HCS import)
            "$OMERO" obj new WellAnnotationLink parent="Well:205" child="MapAnnotation:${ANN_ID}"

            # Optional: quick sanity output
            "$OMERO" hql "select count(l.id) from WellAnnotationLink l where l.parent.id=205" || true
          '
      # ---------------------------------------------------------------------
      # Run pytest in the CI container
      # ---------------------------------------------------------------------    

      - name: Run pytest
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e PYTHONDONTWRITEBYTECODE=1 \
            -e GITHUB_ACTIONS=true \
            -e RUN_HCS_IN_CI="${RUN_HCS_IN_CI}" \
            -e ONTOP_PROPERTIES_FILE="${ONTOP_PROPERTIES_FILE}" \
            --network "${COMPOSE_PROJECT_NAME}_default" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            omero-ci-test \
            bash -lc '
              rm -f /workspace/ontop-cli
              ln -s /opt/ontop-cli /workspace/ontop-cli

              echo "PWD=$(pwd)"
              ls -la /workspace/ontop-cli || true
              ls -la /workspace/ontop-cli/jdbc || true
              ls -la /workspace/ontop-cli/ontop || true

              python -m pytest -q
            '
      # ---------------------------------------------------------------------
      # Teardown always
      # ---------------------------------------------------------------------
      - name: Teardown docker (always)
        if: always()
        run: |
          set -euo pipefail
          if [ -d .omero ]; then
            cd .omero
            docker compose -p "${COMPOSE_PROJECT_NAME}" ps || true
            docker compose -p "${COMPOSE_PROJECT_NAME}" logs --no-color --tail=300 omero || true
            docker compose -p "${COMPOSE_PROJECT_NAME}" logs --no-color --tail=200 db || true
            docker compose -p "${COMPOSE_PROJECT_NAME}" down -v || true
          fi